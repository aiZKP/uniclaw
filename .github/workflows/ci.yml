name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --profile ci

  hard-ceilings:
    name: hard ceilings (§24.2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: TOML-only config rule
        run: |
          set -e
          # Allowed: rustfmt.toml at repo root and Cargo.toml everywhere.
          # Banned config formats per §24.2:
          banned=$(git ls-files \
            '*.yaml' '*.yml' '*.json5' \
            ':!:.github/workflows/*' \
            ':!:**/*.example.*' || true)
          if [ -n "$banned" ]; then
            echo "::error::TOML-only rule violated. Banned config files:"
            echo "$banned"
            exit 1
          fi
      - name: Workspace crate count ≤ 20
        run: |
          set -e
          count=$(grep -c '^\s*"crates/' Cargo.toml || true)
          echo "workspace member count: $count"
          if [ "$count" -gt 20 ]; then
            echo "::error::Workspace exceeds 20 crates (§24.2)"
            exit 1
          fi
